<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melody Canvas Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0ff; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a1a3e, #2d1b69); padding: 20px 40px; }
    header h1 { font-size: 1.8rem; color: #a78bfa; letter-spacing: 2px; }
    header p { color: #9ca3af; font-size: 0.85rem; margin-top: 4px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: #1a1a2e; border: 1px solid #2d2d5e; border-radius: 12px; padding: 28px; margin-bottom: 24px; }
    .card h2 { font-size: 1rem; color: #a78bfa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .upload-zone { border: 2px dashed #4c4c8a; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-zone:hover, .upload-zone.drag { border-color: #a78bfa; background: #1e1e3f; }
    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-zone p { color: #9ca3af; font-size: 0.9rem; }
    .btn { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid #4c4c8a; color: #a78bfa; }
    .btn-outline:hover { background: #2d2d5e; opacity: 1; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .result-item { background: #0f0f1a; border-radius: 8px; padding: 16px; text-align: center; }
    .result-item .label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; }
    .result-item .value { font-size: 1.8rem; font-weight: bold; color: #a78bfa; }
    .status-bar { background: #0f0f1a; border-radius: 8px; padding: 12px 16px; font-size: 0.85rem; color: #9ca3af; display: flex; align-items: center; gap: 10px; }
    .spinner { width: 16px; height: 16px; border: 2px solid #4c4c8a; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    textarea { width: 100%; background: #0f0f1a; border: 1px solid #2d2d5e; border-radius: 8px; color: #e0e0ff; padding: 12px; font-size: 0.9rem; resize: vertical; min-height: 80px; }
    textarea:focus { outline: none; border-color: #a78bfa; }
    #score-output { background: white; border-radius: 8px; padding: 16px; min-height: 100px; }
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .hidden { display: none !important; }
    #section-results, #section-melody, #section-score { display: none; }
  </style>
</head>
<body>

<header>
  <h1>🎵 Melody Canvas Pro</h1>
  <p>오디오 파일에서 BPM · Key · 멜로디 · 악보를 자동 추출</p>
</header>

<div class="container">
  <div class="card">
    <h2>🎧 오디오 업로드</h2>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">🎵</div>
      <p id="upload-label">MP3, WAV, OGG 파일을 클릭하거나 드래그하세요</p>
      <input type="file" id="file-input" accept="audio/*" />
    </div>
    <div class="action-row">
      <button class="btn" id="btn-analyze" disabled onclick="startAnalyze()">분석 시작</button>
    </div>
  </div>

  <div class="status-bar hidden" id="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">분석 중...</span>
  </div>

  <div class="card" id="section-results">
    <h2>📊 분석 결과</h2>
    <div class="result-grid">
      <div class="result-item">
        <div class="label">BPM</div>
        <div class="value" id="result-bpm">—</div>
      </div>
      <div class="result-item">
        <div class="label">Key</div>
        <div class="value" id="result-key">—</div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn" id="btn-melody" onclick="extractMelody()">멜로디 추출</button>
    </div>
  </div>

  <div class="card" id="section-melody">
    <h2>🎼 악보 생성</h2>
    <p style="color:#9ca3af; font-size:0.85rem; margin-bottom:12px;">가사를 입력하면 악보에 함께 표시됩니다 (선택)</p>
    <textarea id="lyrics-input" placeholder="가사 입력 (선택사항)..."></textarea>
    <div class="action-row">
      <button class="btn" id="btn-score" onclick="buildScore()">악보 생성</button>
    </div>
  </div>

  <div class="card" id="section-score">
    <h2>🎹 악보</h2>
    <div id="score-output"></div>
    <div class="action-row">
      <button class="btn btn-outline" onclick="copyAbc()">ABC 복사</button>
    </div>
  </div>
</div>

<script>
  let fileObj = null, fileId = null, analysisResult = null, melodyData = null, abcData = null, pollTimer = null;

  const fileInput = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');

  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function setFile(f) {
    fileObj = f;
    document.getElementById('upload-label').textContent = `✅ ${f.name} (${(f.size/1024/1024).toFixed(2)} MB)`;
    document.getElementById('btn-analyze').disabled = false;
  }

  async function startAnalyze() {
    if (!fileObj) return;
    resetResults();
    showStatus('서버에 업로드 중...');
    const fd = new FormData();
    fd.append('file', fileObj);
    try {
      const res = await fetch('/api/analyze', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, true); return; }
      fileId = data.file_id;
      showStatus('분석 중... (백그라운드 처리)');
      pollStatus();
    } catch(e) { showStatus('❌ 업로드 실패: ' + e.message, true); }
  }

  function pollStatus() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`/api/status/${fileId}`);
        const data = await res.json();
        if (data.status === 'done') {
          clearInterval(pollTimer);
          analysisResult = data;
          hideStatus();
          showResults(data);
        } else if (data.status === 'error') {
          clearInterval(pollTimer);
          showStatus('❌ 분석 오류: ' + data.error, true);
        }
      } catch(e) { clearInterval(pollTimer); showStatus('❌ 상태 확인 실패', true); }
    }, 2000);
  }

  function showResults(data) {
    document.getElementById('result-bpm').textContent = data.beat?.bpm ?? '—';
    document.getElementById('result-key').textContent = data.key?.key_str ?? '—';
    document.getElementById('section-results').style.display = 'block';
  }

  async function extractMelody() {
    document.getElementById('btn-melody').disabled = true;
    showStatus('멜로디 추출 중... (30~60초 소요)');
    try {
      const res = await fetch('/api/extract_melody', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file_id: fileId })
      });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, true); document.getElementById('btn-melody').disabled = false; return; }
      melodyData = data.melody;
      hideStatus();
      document.getElementById('section-melody').style.display = 'block';
      document.getElementById('btn-melody').disabled = false;
    } catch(e) { showStatus('❌ 멜로디 추출 실패: ' + e.message, true); document.getElementById('btn-melody').disabled = false; }
  }

  async function buildScore() {
    if (!melodyData) return;
    document.getElementById('btn-score').disabled = true;
    showStatus('악보 생성 중...');
    try {
      const res = await fetch('/api/build_score', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ melody: melodyData, bpm: analysisResult?.beat?.bpm ?? 120, key: analysisResult?.key ?? { key: 'C' }, lyrics: document.getElementById('lyrics-input').value })
      });
      const data = await res.json();
      if (data.error) { showStatus('❌ ' + data.error, true); document.getElementById('btn-score').disabled = false; return; }
      abcData = data.abc;
      hideStatus();
      document.getElementById('section-score').style.display = 'block';
      ABCJS.renderAbc('score-output', abcData, { responsive: 'resize' });
      document.getElementById('btn-score').disabled = false;
    } catch(e) { showStatus('❌ 악보 생성 실패: ' + e.message, true); document.getElementById('btn-score').disabled = false; }
  }

  function copyAbc() {
    if (!abcData) return;
    navigator.clipboard.writeText(abcData).then(() => alert('ABC 노테이션이 복사됐습니다!'));
  }

  function showStatus(msg, isError = false) {
    const bar = document.getElementById('status-bar');
    bar.classList.remove('hidden');
    document.getElementById('status-text').textContent = msg;
    document.getElementById('spinner').style.display = isError ? 'none' : 'block';
    bar.style.color = isError ? '#f87171' : '#9ca3af';
  }

  function hideStatus() { document.getElementById('status-bar').classList.add('hidden'); }

  function resetResults() {
    fileId = null; analysisResult = null; melodyData = null; abcData = null;
    if (pollTimer) clearInterval(pollTimer);
    document.getElementById('section-results').style.display = 'none';
    document.getElementById('section-melody').style.display = 'none';
    document.getElementById('section-score').style.display = 'none';
    document.getElementById('score-output').innerHTML = '';
  }
</script>
</body>
</html>
